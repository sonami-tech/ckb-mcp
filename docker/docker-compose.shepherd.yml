# Shepherd auto-updater Docker Compose configuration
# Usage: docker compose -f docker/docker-compose.shepherd.yml up -d

services:
  shepherd:
    image: mazzolino/shepherd
    container_name: ckb-mcp-shepherd
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/ckb-mcp:/opt/ckb-mcp:ro
    environment:
      # Check for updates every 5 minutes
      - SLEEP_TIME=5m
      # Only update containers with shepherd labels
      - LABEL_ENABLE=true
      # Clean up old images after update
      - CLEANUP=true
      # Enable logging for debugging
      - LOG_LEVEL=info
    command: update