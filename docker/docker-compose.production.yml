# Production server Docker Compose configuration
# Usage: docker compose -f docker/docker-compose.production.yml up -d

services:
  ckb-mcp:
    image: ghcr.io/sonami-tech/ckb-mcp:latest
    container_name: ckb-mcp-production
    ports:
      - "8001:8001"  # RPC server
      - "8002:8002"  # Docs server
      - "8003:8003"  # Tools server
    environment:
      - RUST_LOG=info
      - CKB_RPC_URL=${CKB_RPC_URL:-http://127.0.0.1:8114}
      - TZ=America/Los_Angeles
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8001/health && curl -f http://localhost:8002/health && curl -f http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # Enable Shepherd auto-updates
      - "shepherd.enable=true"
      - "shepherd.autoupdate=true"