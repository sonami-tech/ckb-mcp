# Production server Docker Compose configuration
# Usage: docker compose -f docker/docker-compose.production.yml up -d

services:
  ckb-mcp:
    image: ghcr.io/sonami-tech/ckb-mcp:latest
    container_name: ckb-mcp-production
    ports:
      - "3112:3112"  # Unified MCP server
    # Override the image CMD for this internet-facing deployment. Must reproduce
    # the image's default args, then append the production-specific flags:
    #   --enforce-hosts / --allowed-hosts : Host-header guard (DNS-rebinding).
    #   --no-reset-stats-on-incompatible  : do NOT silently wipe the stats DB if
    #     it is incompatible/corrupt; fail startup and preserve it for manual
    #     inspection instead. NOTE: with `restart: unless-stopped` below, an
    #     incompatible stats DB will crash-loop the container until an operator
    #     removes /app/data/ckb-ai-mcp-stats.redb (or drops this flag). This is
    #     the intended trade: loud failure + data preserved over a silent reset.
    command:
      - /bin/sh
      - -c
      - >-
        exec /usr/local/bin/ckb-ai-mcp
        --host 0.0.0.0 --port 3112
        --ckb-rpc ${CKB_RPC_URL:-http://127.0.0.1:8114}
        --docs-path /app/docs
        --stats-db /app/data/ckb-ai-mcp-stats.redb
        --enforce-hosts
        --allowed-hosts mcp.ckbdev.com,localhost,127.0.0.1,::1
        --no-reset-stats-on-incompatible
    environment:
      - RUST_LOG=info
      - CKB_RPC_URL=${CKB_RPC_URL:-http://127.0.0.1:8114}
      - TZ=America/Los_Angeles
    volumes:
      - ckb-mcp-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3112/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # Enable Watchtower auto-updates
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  ckb-mcp-data:
