# Production server Docker Compose configuration
# Usage: docker compose -f docker/docker-compose.production.yml up -d

services:
  ckb-mcp:
    image: ghcr.io/sonami-tech/ckb-mcp:latest
    container_name: ckb-mcp-production
    ports:
      - "3112:3112"  # Unified MCP server
    environment:
      - RUST_LOG=info
      - CKB_RPC_URL=${CKB_RPC_URL:-http://127.0.0.1:8114}
      - TZ=America/Los_Angeles
    volumes:
      - ckb-mcp-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3112/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # Enable Watchtower auto-updates
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  ckb-mcp-data:
