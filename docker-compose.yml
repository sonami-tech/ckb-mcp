# Local development Docker Compose configuration
# Usage: docker compose up --build

services:
  ckb-mcp:
    build: .
    container_name: ckb-mcp-dev
    ports:
      - "3112:3112"  # Unified MCP server
    environment:
      - RUST_LOG=debug
      - CKB_RPC_URL=${CKB_RPC_URL:-http://127.0.0.1:8114}
      - TZ=America/Los_Angeles
    volumes:
      - ckb-mcp-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3112/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ckb-mcp-data:
