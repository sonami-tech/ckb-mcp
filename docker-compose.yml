# Local development Docker Compose configuration
# Usage: docker compose up --build

services:
  ckb-mcp:
    build: .
    container_name: ckb-mcp-dev
    ports:
      - "8001:8001"  # RPC server
      - "8002:8002"  # Docs server
      - "8003:8003"  # Tools server
    environment:
      - RUST_LOG=debug
      - CKB_RPC_URL=http://127.0.0.1:8114
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8001/health && curl -f http://localhost:8002/health && curl -f http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s