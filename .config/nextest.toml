[profile.default]
# Run tests one at a time in alphabetical order
test-threads = 1

# Retry flaky tests twice (3 total attempts: initial + 2 retries) with exponential backoff (5s, 10s)
retries = { backoff = "exponential", count = 2, delay = "5s", jitter = false }

# Mark tests as slow after 45s, terminate after 135s (3 periods)
slow-timeout = { period = "45s", terminate-after = 3 }

